name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.2'

      - name: Build Project
        uses: threeal/cmake-action@v2

      - name: Run Tests
        run: |
          cd build/test
          ctest --output-on-failure
